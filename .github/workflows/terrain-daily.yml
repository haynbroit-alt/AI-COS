name: terrain-daily

# Boucle terrain autonome — s'exécute sur l'infra GitHub, SANS session de chat.
# Utilise les secrets de dépôt STRIPE_API_KEY / RESEND_API_KEY.
# Alerte = échec du job (GitHub notifie par e-mail) uniquement si needs_human.

on:
  schedule:
    - cron: "0 6 * * *"   # ~08:00 Paris
  workflow_dispatch: {}    # déclenchement manuel (smoke test)

permissions:
  contents: write          # pour committer/pousser l'état terrain

concurrency:
  group: terrain-daily     # jamais deux exécutions en parallèle
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branche de travail
        uses: actions/checkout@v4
        with:
          ref: claude/system-architect-rules-9zz9v1
          fetch-depth: 0

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Boucle V9 (relevé + cycle + relance le 22/07)
        id: loop
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          LOOP_SKIP_PUSH: "1"   # le commit/push est fait par le step suivant
        run: |
          set +e
          RELANCE=""
          if [ "$(date -u +%F)" = "2026-07-22" ]; then RELANCE="--relance"; fi
          python terrain/loop.py $RELANCE
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit + push état terrain
        run: |
          git config user.name  "velyx-terrain-bot"
          git config user.email "velyx-terrain-bot@users.noreply.github.com"
          git add terrain/
          if git diff --cached --quiet; then
            echo "Rien à committer."
          else
            git commit -m "terrain: run auto $(date -u +%F) [skip ci]"
            git pull --rebase origin claude/system-architect-rules-9zz9v1 || true
            git push origin HEAD:claude/system-architect-rules-9zz9v1
          fi

      - name: Alerte si intervention humaine nécessaire
        run: |
          if [ "${{ steps.loop.outputs.code }}" = "3" ]; then
            echo "::error::needs_human — voir la sortie de la boucle (secret absent / réponse prospect / échec persistant)."
            exit 1
          fi
          echo "OK — aucune intervention humaine requise."
